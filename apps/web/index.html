<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1f1a" />
    <title>GalMail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* GalMail cold-start loading screen.
         Mirrors the React LoadingScreen component (apps/web/src/components/LoadingScreen.tsx)
         and the rules in app.css, using hardcoded dark-token fallbacks so the very
         first paint is already polished, before any CSS/JS bundle loads.
         React replaces this markup on mount; the <style> stays and re-styles the
         React-rendered LoadingScreen via the same class names. */
      .loading-screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        margin: 0;
        background: #08090a;
        color: #e6e8ec;
        font-family: "Inter", "DM Sans", "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .loading-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.15rem;
        text-align: center;
      }
      .loading-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 6px;
        width: 54px;
        height: 54px;
      }
      .loading-cell {
        width: 100%;
        height: 100%;
        border-radius: 4px;
        background: #5e6ad2;
        opacity: 0.25;
        transform: scale(0.7);
        animation: loading-wave 1.6s cubic-bezier(0.32, 0.72, 0, 1) infinite;
      }
      .loading-cell:nth-child(1) { animation-delay: 0s; }
      .loading-cell:nth-child(2) { animation-delay: 0.1s; }
      .loading-cell:nth-child(3) { animation-delay: 0.2s; }
      .loading-cell:nth-child(4) { animation-delay: 0.1s; }
      .loading-cell:nth-child(5) { animation-delay: 0.2s; }
      .loading-cell:nth-child(6) { animation-delay: 0.3s; }
      .loading-cell:nth-child(7) { animation-delay: 0.2s; }
      .loading-cell:nth-child(8) { animation-delay: 0.3s; }
      .loading-cell:nth-child(9) { animation-delay: 0.4s; }
      @keyframes loading-wave {
        0%, 100% { opacity: 0.25; transform: scale(0.7); }
        45% { opacity: 1; transform: scale(1); }
      }
      .loading-eyebrow {
        margin: 0;
        color: #969cab;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .loading-status {
        margin: 0;
        color: #747b8a;
        font-size: 0.9rem;
        line-height: 1.4;
      }
      @media (prefers-reduced-motion: reduce) {
        .loading-cell { animation: none; opacity: 0.55; transform: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen" role="status" aria-live="polite">
        <div class="loading-brand">
          <div class="loading-grid" aria-hidden="true">
            <span class="loading-cell"></span>
            <span class="loading-cell"></span>
            <span class="loading-cell"></span>
            <span class="loading-cell"></span>
            <span class="loading-cell"></span>
            <span class="loading-cell"></span>
            <span class="loading-cell"></span>
            <span class="loading-cell"></span>
            <span class="loading-cell"></span>
          </div>
          <p class="loading-eyebrow">GalMail</p>
          <p class="loading-status">Loading encrypted local graph…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
