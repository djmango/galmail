name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install sops and age
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64"
          chmod +x /usr/local/bin/sops
          curl -fsSL -o /tmp/age.tgz \
            "https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz"
          tar -xzf /tmp/age.tgz -C /tmp
          install -m 755 /tmp/age/age /tmp/age/age-keygen /usr/local/bin/
          sops --version
          age-keygen --version
      - run: bun install --frozen-lockfile
      - name: Lint (no em/en dashes in frontend)
        run: bun run lint:emdash
      - name: Format
        run: bun run format:js
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
      - run: bun run secrets:check
      - run: bun run security:check
      - run: bun run security:dependencies

      - run: bun run build
      - run: bun scripts/check-budgets.ts
      - run: bun run bench
      - run: bun run sbom
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-sbom
          path: artifacts/galmail.cdx.json

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run --filter @galmail/core-api build
      - run: bun run --filter './packages/*' build
      - run: bunx playwright install --with-deps chromium
      - run: bun run e2e

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev libxdo-dev
      - run: cargo fmt --all --check
      - run: cargo fmt --manifest-path apps/web/src-tauri/Cargo.toml --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --manifest-path apps/web/src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path apps/web/src-tauri/Cargo.toml --all-targets -- -D warnings
      # cargo-audit CLI (not rustsec/audit-check): push events lack Checks:write
      # for that action ("Resource not accessible by integration").
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit
      - run: cargo audit --file apps/web/src-tauri/Cargo.lock

  ios-project:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # rustup occasionally hits "Connection reset by peer" against static.rust-lang.org.
      - name: Install Rust toolchain
        id: ios-rust
        continue-on-error: true
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - name: Retry Rust toolchain
        if: steps.ios-rust.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - run: brew install xcodegen
      - run: mkdir -p apps/web/src-tauri/gen/apple/assets
      - run: cargo check --manifest-path apps/web/src-tauri/Cargo.toml --target aarch64-apple-ios-sim
      - run: xcodegen generate
        working-directory: apps/web/src-tauri/gen/apple
      - run: >
          xcodebuild
          -project galmail-tauri.xcodeproj
          -scheme GalMailAppleTests
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build-for-testing
        working-directory: apps/web/src-tauri/gen/apple
      - run: >
          xcodebuild
          -project galmail-tauri.xcodeproj
          -target GalMailNotificationService
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
        working-directory: apps/web/src-tauri/gen/apple
      - run: >
          xcodebuild
          -project galmail-tauri.xcodeproj
          -target GalMailShareExtension
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
        working-directory: apps/web/src-tauri/gen/apple

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v20
      - run: nix develop --command bun --version
      - run: nix develop --command cargo --version
      - run: nix develop --command bun install --frozen-lockfile
