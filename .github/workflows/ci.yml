name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r --filter './packages/*' build
      - run: pnpm --filter @galmail/web typecheck
      - run: pnpm -r test
      - run: pnpm --filter @galmail/web build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path crates/galmail-core/Cargo.toml
