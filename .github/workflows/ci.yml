name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run security:check
      - run: bun run security:dependencies
      - run: bun test
      - run: bun run typecheck
      - run: bun run build
      - run: bun scripts/check-budgets.ts
      - run: bun run bench
      - run: bun run sbom
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-sbom
          path: artifacts/galmail.cdx.json
      - run: bun run format:js

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run e2e

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo fmt --all --check
      - run: cargo fmt --manifest-path apps/web/src-tauri/Cargo.toml --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --manifest-path apps/web/src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path apps/web/src-tauri/Cargo.toml --all-targets -- -D warnings
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: apps/web/src-tauri

  ios-project:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - run: brew install xcodegen
      - run: cargo check --manifest-path apps/web/src-tauri/Cargo.toml --target aarch64-apple-ios-sim
      - run: xcodegen generate
        working-directory: apps/web/src-tauri/gen/apple
      - run: >
          xcodebuild
          -project galmail-tauri.xcodeproj
          -scheme GalMailAppleTests
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build-for-testing
        working-directory: apps/web/src-tauri/gen/apple
      - run: >
          xcodebuild
          -project galmail-tauri.xcodeproj
          -target GalMailNotificationService
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
        working-directory: apps/web/src-tauri/gen/apple
      - run: >
          xcodebuild
          -project galmail-tauri.xcodeproj
          -target GalMailShareExtension
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
        working-directory: apps/web/src-tauri/gen/apple

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v20
      - run: nix develop --command bun --version
      - run: nix develop --command cargo --version
      - run: nix develop --command bun install --frozen-lockfile
