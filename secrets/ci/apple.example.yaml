# Example shape for secrets/ci/apple.yaml (encrypt with sops; never commit plaintext).
# Recipients: operator SSH key + CI age key (see .sops.yaml).
#
#   cp secrets/ci/apple.example.yaml secrets/ci/apple.yaml
#   # fill values, then:
#   sops -e -i secrets/ci/apple.yaml
#
# CI decrypts with repository secret SOPS_AGE_KEY (age private key for &galmail_ci).

APP_STORE_CONNECT_API_KEY_ID: ""
APP_STORE_CONNECT_API_ISSUER_ID: ""
APP_STORE_CONNECT_API_KEY: |
  -----BEGIN PRIVATE KEY-----
  REPLACE_WITH_AUTHKEY_P8
  -----END PRIVATE KEY-----
IOS_DISTRIBUTION_CERTIFICATE_BASE64: ""
IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ""
IOS_PROVISIONING_PROFILES_BASE64: ""
IOS_KEYCHAIN_PASSWORD: "galmail-ci-keychain"
