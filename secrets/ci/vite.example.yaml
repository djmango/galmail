# Public OAuth client IDs baked into TestFlight / release web builds (Vite).
# These are public native client IDs (not client secrets). Still kept in sops so
# CI and operators share one source of truth with secrets/ci/apple.yaml.
#
#   cp secrets/ci/vite.example.yaml secrets/ci/vite.yaml
#   # fill values, then:
#   sops -e -i secrets/ci/vite.yaml
#
# CI decrypts with repository secret SOPS_AGE_KEY (same as apple.yaml).

VITE_GOOGLE_IOS_CLIENT_ID: ""
VITE_MICROSOFT_CLIENT_ID: ""
VITE_MICROSOFT_TENANT: "common"
